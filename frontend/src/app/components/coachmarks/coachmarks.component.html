<section class="page-section">
  <div class="section-header">
    <h1>Scores</h1>
  </div>

  <div class="panel" [class.edit-mode]="isEditMode">
    <div class="panel-heading">
      <h2>{{ isEditMode ? 'Modifier le score' : 'Créer / mettre à jour un score' }}</h2>
      <button *ngIf="isEditMode" type="button" class="cancel-edit-btn" (click)="cancelEdit()">
        ✕ Annuler
      </button>
    </div>

    <div class="form-grid">
      <div class="field">
        <label>Nom utilisateur</label>
        <input
          [(ngModel)]="associate.user.nom"
          (ngModelChange)="updateUserSuggestionList('associate')"
          placeholder="Nom"
          [readonly]="isEditMode"
        />

        <div *ngIf="associateUserSuggestions.length" class="suggestion-list">
          <button
            type="button"
            class="suggestion-item"
            *ngFor="let user of associateUserSuggestions"
            (click)="selectSuggestedUser(user, 'associate')">
            {{ user.nom }} {{ user.prenom }}
          </button>
        </div>
      </div>

      <div class="field">
        <label>Prénom utilisateur</label>
        <input
          [(ngModel)]="associate.user.prenom"
          (ngModelChange)="updateUserSuggestionList('associate')"
          placeholder="Prénom"
          [readonly]="isEditMode"
        />
      </div>

      <div class="field">
        <label>Nom guide</label>
        <input
          [(ngModel)]="associate.guide.nom"
          (ngModelChange)="updateGuideSuggestionList('associate')"
          placeholder="Guide"
          [readonly]="isEditMode"
        />

        <div *ngIf="associateGuideSuggestions.length" class="suggestion-list">
          <button
            type="button"
            class="suggestion-item"
            *ngFor="let guide of associateGuideSuggestions"
            (click)="selectSuggestedGuide(guide, 'associate')">
            {{ guide.nom }}
          </button>
        </div>
      </div>

      <div class="field">
        <label>Score {{ isEditMode ? '' : 'initial' }}</label>
        <input
          type="number"
          [(ngModel)]="associate.score"
        />
      </div>

      <div class="field actions">
        <button
          type="button"
          [class.btn-edit]="isEditMode"
          (click)="associateUser()">
          <svg *ngIf="isEditMode" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
               fill="currentColor" viewBox="0 0 24 24" style="margin-right:6px;vertical-align:middle">
            <path d="M3 17.25V21h3.75l11.06-11.06-3.75-3.75L3 17.25zm17.71-10.21a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
          </svg>
          {{ isEditMode ? 'Modifier' : 'Enregistrer' }}
        </button>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-heading">
      <h2>Recherche de scores</h2>
    </div>

    <div class="form-grid">
      <div class="field">
        <label>Nom utilisateur</label>
        <input
          [(ngModel)]="searchNom"
          (ngModelChange)="onSearchUserInput()"
          placeholder="Nom"
        />

        <div *ngIf="searchUserSuggestions.length" class="suggestion-list">
          <button
            type="button"
            class="suggestion-item"
            *ngFor="let user of searchUserSuggestions"
            (click)="selectSuggestedUser(user, 'search')">
            {{ user.nom }} {{ user.prenom }}
          </button>
        </div>
      </div>

      <div class="field">
        <label>Prénom</label>
        <input
          [(ngModel)]="searchPrenom"
          (ngModelChange)="onSearchUserInput()"
          placeholder="Prénom"
        />
      </div>

      <div class="field">
        <label>Nom guide</label>
        <input
          [(ngModel)]="searchGuideNom"
          (ngModelChange)="onSearchGuideInput()"
          placeholder="Nom du guide"
        />
      </div>

      <div class="field actions">
        <button
          type="button"
          class="secondary"
          (click)="findScores()">
          Afficher les scores
        </button>
      </div>
    </div>
  </div>

  <div *ngIf="message" class="message">
    {{ message }}
  </div>

  <div class="list-header">
    <h2>Liste des scores</h2>
    <button
      type="button"
      class="toggle-btn"
      (click)="showScores = !showScores">
      {{ showScores ? 'Masquer la liste' : 'Afficher la liste' }}
    </button>
  </div>

  <div class="table-wrapper" *ngIf="showScores">
    <table *ngIf="userScores.length">
      <thead>
        <tr>
          <th>Nom utilisateur</th>
          <th>Prénom</th>
          <th>Guide</th>
          <th>Score</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let score of userScores" class="table-row">
          <td>{{ score.user.nom }}</td>
          <td>{{ score.user.prenom }}</td>
          <td>{{ score.guide.nom }}</td>
          <td>{{ score.score }}</td>
          <td>
            <button type="button" class="icon-btn edit-icon-btn" (click)="editScore(score)" title="Modifier">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                   fill="currentColor" viewBox="0 0 24 24">
                <path d="M3 17.25V21h3.75l11.06-11.06-3.75-3.75L3 17.25zm17.71-10.21a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
              </svg>
            </button>
          </td>
        </tr>
      </tbody>
    </table>

    <p *ngIf="!userScores.length">
      Aucun score affiché.
    </p>
  </div>
</section>
